id: pca
name: Principal Component Analysis (PCA)
intents: [ordination]
requires:
  counts: feature_count_table
params:
  n_components: {default: 3}
  scale: {default: true}
assumptions:
  - min_genomes_5
  - min_features_2
cost_model: bgclens.catalog.methods.ordination:pca_cost
impl: bgclens.catalog.methods.ordination:run_pca
citation:
  doi: "10.1080/14786440109462720"
  note: "Pearson 1901 PCA"
